<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>India General Knowledge | Learning Skills</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef8ff;
}

header{
background:linear-gradient(90deg,#003366,#00aaff);
color:white;
text-align:center;
padding:35px 15px;
}

header h1{
font-size:38px;
}

header p{
margin-top:10px;
font-size:18px;
}

.container{
width:95%;
max-width:900px;
margin:auto;
padding:20px;
}

.search-box input{

width:100%;
padding:14px;
font-size:18px;
border-radius:10px;
border:2px solid #00aaff;
margin-bottom:15px;

}

select{

width:100%;
padding:14px;
font-size:18px;
border-radius:10px;
border:2px solid #00aaff;
margin-bottom:20px;

}

.card{

background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.15);

}

.card h2{

color:#0077cc;
margin-bottom:20px;

}

#question{

font-size:24px;
margin-bottom:20px;
line-height:1.6;

}

#answer{

display:none;
background:#d4edda;
padding:15px;
border-left:5px solid green;
border-radius:8px;
font-size:18px;

}

.buttons{

text-align:center;
margin-top:25px;

}

button{

padding:12px 20px;
font-size:16px;
background:#0088cc;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;

}

button:hover{

background:#0066aa;

}

.counter{

text-align:center;
margin:20px;
font-size:20px;
font-weight:bold;

}

footer{

background:#02284f;
color:white;
text-align:center;
padding:25px;
margin-top:40px;

}

.home{

display:inline-block;
margin-top:15px;
padding:10px 20px;
background:#00aaff;
color:white;
text-decoration:none;
border-radius:8px;

}

</style>

</head>

<body>

<header>

<h1>🇮🇳 India General Knowledge</h1>

<p>Learning Skills</p>

</header>

<div class="container">

<div class="search-box">

<input
type="text"
id="search"
placeholder="🔍 প্রশ্ন খুঁজুন">

</div>

<select id="category">

<option value="All">সব বিভাগ</option>
<option value="History">History</option>
<option value="Geography">Geography</option>
<option value="Science">Science</option>
<option value="Polity">Polity</option>
<option value="Economy">Economy</option>

</select>

<div class="card">

<h2 id="cat">History</h2>

<h3 id="question">
Loading...
</h3>

<p id="answer"></p>

<div class="buttons">

<button onclick="showAnswer()">
👁 উত্তর দেখুন
</button>

<button onclick="previousQuestion()">
⬅ Previous
</button>

<button onclick="randomQuestion()">
🎲 Random
</button>

<button onclick="nextQuestion()">
Next ➡
</button>

</div>

</div>

<div class="counter">

Question
<span id="current">1</span>
/
<span id="total">0</span>

</div>

 <script>

const questions = [

{
category:"History",
question:"ভারতের প্রথম প্রধানমন্ত্রী কে ছিলেন?",
answer:"জওহরলাল নেহরু"
},

{
category:"History",
question:"ভারত কবে স্বাধীনতা লাভ করে?",
answer:"১৫ আগস্ট ১৯৪৭"
},

{
category:"History",
question:"ভারতের সংবিধান কবে কার্যকর হয়?",
answer:"২৬ জানুয়ারি ১৯৫০"
},

{
category:"Geography",
question:"ভারতের রাজধানী কী?",
answer:"নয়াদিল্লি"
},

{
category:"Geography",
question:"ভারতের বৃহত্তম রাজ্য (আয়তনে) কোনটি?",
answer:"রাজস্থান"
},

{
category:"Geography",
question:"ভারতের দীর্ঘতম নদী কোনটি?",
answer:"গঙ্গা"
},

{
category:"Science",
question:"জলের রাসায়নিক সংকেত কী?",
answer:"H₂O"
},

{
category:"Science",
question:"মানবদেহের সবচেয়ে বড় অঙ্গ কোনটি?",
answer:"ত্বক"
},

{
category:"Polity",
question:"ভারতের রাষ্ট্রপতির সরকারি বাসভবনের নাম কী?",
answer:"রাষ্ট্রপতি ভবন"
},

{
category:"Economy",
question:"ভারতের কেন্দ্রীয় ব্যাংকের নাম কী?",
answer:"Reserve Bank of India (RBI)"
}

];

let filtered=[...questions];
let current=0;

function loadQuestion(){

document.getElementById("question").innerHTML=filtered[current].question;

document.getElementById("answer").innerHTML="✅ "+filtered[current].answer;

document.getElementById("answer").style.display="none";

document.getElementById("cat").innerHTML=filtered[current].category;

document.getElementById("current").innerHTML=current+1;

document.getElementById("total").innerHTML=filtered.length;

}

function showAnswer(){

let ans=document.getElementById("answer");

ans.style.display=(ans.style.display=="block")?"none":"block";

}

function nextQuestion(){

if(current<filtered.length-1){

current++;

loadQuestion();

}

}

function previousQuestion(){

if(current>0){

current--;

loadQuestion();

}

}

function randomQuestion(){

current=Math.floor(Math.random()*filtered.length);

loadQuestion();

}

document.getElementById("category").onchange=function(){

let value=this.value;

if(value=="All"){

filtered=[...questions];

}else{

filtered=questions.filter(q=>q.category===value);

}

current=0;

loadQuestion();

};

document.getElementById("search").onkeyup=function(){

let text=this.value.toLowerCase();

filtered=questions.filter(q=>

q.question.toLowerCase().includes(text)

);

if(filtered.length==0){

document.getElementById("question").innerHTML="❌ কোনো প্রশ্ন পাওয়া যায়নি";

document.getElementById("answer").style.display="none";

document.getElementById("current").innerHTML="0";

document.getElementById("total").innerHTML="0";

return;

}

current=0;

loadQuestion();

};

window.onload=loadQuestion;

 </script>

<footer>

<h2>📚 Learning Skills</h2>

<p>India General Knowledge Portal</p>

</p>

</footer>

</body>
</html>
